<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Siberay | Yönetim Paneli</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 2rem; }
    .admin-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 2rem; }
    .admin-box { background: var(--bg-card); border: 1px solid var(--accent-cyan); border-radius: 12px; padding: 3rem; box-shadow: 0 0 30px rgba(0, 212, 255, 0.1); }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: var(--accent-cyan); font-family: 'Share Tech Mono', monospace; }
    .form-control { width: 100%; background: var(--bg-secondary); border: 1px solid var(--border); color: white; padding: 1rem; border-radius: 6px; font-family: 'Exo 2', sans-serif; }
    textarea.form-control { min-height: 250px; resize: vertical; }
    
    /* Yan Yana Düzen için */
    .dashboard { display: none; grid-template-columns: 2fr 1fr; gap: 2rem; }
    @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }
    
    /* Login Ekranı */
    #loginScreen { max-width: 400px; margin: 10vh auto; }
  </style>
</head>
<body>

  <div class="admin-box" id="loginScreen">
    <h2 style="text-align: center; color: var(--text-primary); margin-bottom: 2rem;">Yetkili Girişi</h2>
    <input type="email" id="loginEmail" class="form-control" placeholder="E-posta" style="margin-bottom: 1rem;">
    <input type="password" id="loginPass" class="form-control" placeholder="Şifre" style="margin-bottom: 1rem;">
    <button onclick="girisYap()" class="btn btn-primary" style="width: 100%;">Giriş Yap</button>
    <p id="loginHata" style="color: red; margin-top: 1rem; text-align: center; display: none;">Hatalı bilgi!</p>
  </div>

  <div class="admin-container dashboard" id="adminPanel">
    
    <div class="admin-box">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h2 style="color: var(--accent-cyan);">Haber Yayınla</h2>
        <button onclick="cikisYap()" class="btn btn-outline" style="padding: 0.4rem 1rem; font-size: 0.8rem;">Çıkış Yap</button>
      </div>

      <form id="haberForm">
        <div class="form-group"><label>HABER BAŞLIĞI</label><input type="text" id="baslik" class="form-control" required></div>
        <div class="form-group"><label>KAPAK FOTOĞRAFI</label><input type="file" id="gorselDosyasi" class="form-control" accept="image/*" required></div>
        <div class="form-group"><label>KISA ÖZET</label><input type="text" id="ozet" class="form-control" required></div>
        <div class="form-group"><label>HABER İÇERİĞİ</label><textarea id="icerik" class="form-control" required placeholder="<p>Paragraf</p>... İstediğin yere görsel kodunu yapıştır."></textarea></div>
        <button type="submit" id="submitBtn" class="btn btn-primary" style="width: 100%;">🚀 SİSTEME YÜKLE</button>
      </form>
      <div id="mesaj" style="color: #2ecc71; text-align: center; margin-top: 1rem; display: none;">Yüklendi!</div>
    </div>

    <div class="admin-box" style="height: fit-content; padding: 2rem;">
      <h3 style="color: var(--text-primary); margin-bottom: 1rem; font-size: 1.2rem;">Ara Görsel Üretici</h3>
      <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1rem;">Yazının arasına resim koymak için buraya yükle, verdiği kodu kopyalayıp yandaki metnin içine yapıştır.</p>
      
      <input type="file" id="araGorsel" class="form-control" accept="image/*" style="margin-bottom: 1rem;">
      <button onclick="araGorselYukle()" id="araGorselBtn" class="btn btn-outline" style="width: 100%; margin-bottom: 1rem;">Kodu Üret</button>
      
      <textarea id="araGorselKodu" class="form-control" style="min-height: 80px; font-size: 0.8rem;" readonly placeholder="Kod burada çıkacak..."></textarea>
    </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <script>
    // FİREBASE ANAHTARLARIN
    const firebaseConfig = {
  apiKey: "AIzaSyDdny3t8-vF2x53XpPHwPkNSz2UfEUm0Zc",
  authDomain: "siberay.firebaseapp.com",
  projectId: "siberay",
  storageBucket: "siberay.firebasestorage.app",
  messagingSenderId: "953124646102",
  appId: "1:953124646102:web:6757b08c2aeb652140ed77",
  measurementId: "G-RGLC0Y937Q"
};

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const imgbbAPIKey = "d3340ef4bc18e5057941ef5fcb3e5f37";

    // --- AUTHENTICATION (KİMLİK KONTROLÜ) ---
    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'grid';
      } else {
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('adminPanel').style.display = 'none';
      }
    });

    function girisYap() {
      const email = document.getElementById('loginEmail').value;
      const pass = document.getElementById('loginPass').value;
      auth.signInWithEmailAndPassword(email, pass).catch(error => {
        document.getElementById('loginHata').style.display = 'block';
      });
    }

    function cikisYap() { auth.signOut(); }

    // --- ARA GÖRSEL (PARAGRAF İÇİ) YÜKLEYİCİ ---
    async function araGorselYukle() {
      const dosya = document.getElementById('araGorsel').files[0];
      if(!dosya) return alert("Önce resim seç!");
      
      const btn = document.getElementById('araGorselBtn');
      btn.innerHTML = "Yükleniyor...";
      
      const formData = new FormData();
      formData.append("image", dosya);
      
      try {
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbAPIKey}`, { method: "POST", body: formData });
        const data = await res.json();
        
        // Şık bir resim kodu oluştur (tasarımı bozmaması için genişlik %100 ayarlandı)
        const htmlKodu = `<div style="margin: 2rem 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--border);"><img src="${data.data.url}" style="width: 100%; display: block;"></div>`;
        document.getElementById('araGorselKodu').value = htmlKodu;
      } catch(e) { alert("Hata!"); }
      btn.innerHTML = "Kodu Üret";
    }

    // --- ANA HABER GÖNDERME FONKSİYONU ---
    document.getElementById('haberForm').addEventListener('submit', async function(e) {
      e.preventDefault(); 
      const btn = document.getElementById('submitBtn');
      btn.innerHTML = "Yükleniyor...";
      
      try {
        const formData = new FormData();
        formData.append("image", document.getElementById('gorselDosyasi').files[0]);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbAPIKey}`, { method: "POST", body: formData });
        const data = await res.json();

        await db.collection("haberler").add({
          baslik: document.getElementById('baslik').value,
          gorsel: data.data.url,
          ozet: document.getElementById('ozet').value,
          icerik: document.getElementById('icerik').value,
          tarih: new Date().toLocaleDateString('tr-TR'),
          zamanDamgasi: firebase.firestore.FieldValue.serverTimestamp()
        });

        document.getElementById('mesaj').style.display = 'block';
        document.getElementById('haberForm').reset();
        setTimeout(() => document.getElementById('mesaj').style.display = 'none', 4000);
      } catch(e) { alert("Hata oluştu!"); }
      btn.innerHTML = "🚀 SİSTEME YÜKLE";
    });
  </script>
</body>
</html>
